schema: memia.connectors.scaffold.v1
updatedAt: 2026-07-09
statusRule: Scaffolded means this package ships the connector contract, auth model, endpoints, MEMIA mappings and safety rules, but no verified adapter runs out of the box. It becomes verified only when a real adapter plus probe and dry-run pass with the user credentials.
defaultGovernance:
  defaultMode: read_only
  dryRunFirst: true
  l5RequiresApproval: true
  auditLog: true
  secretsPolicy: secret_ref_only
publicProbe: config_presence
connectors:
  - id: notion
    name: Notion
    family: files-knowledge
    supportLevel: native
    implementationStatus: scaffolded
    adapter:
      type: rest
      auth: oauth_or_internal_integration_token
      baseUrl: https://api.notion.com/v1
      secretRef: keychain://memia/connectors/notion
    reads:
      - pages
      - databases
      - blocks
      - comments
    writes:
      - proposed_page_update
      - proposed_database_item
    mapping:
      page: memia.capture.document
      database: memia.capture.structured_collection
      database_item: memia.capture.structured_record
      block: memia.capture.document_block
    conditionsToVerify:
      - Provide an OAuth or integration token as a secretRef.
      - Ship a probe on the search endpoint and a pages sample.
      - Ship a block-to-markdown normalizer and a dry-run import.
    nextProbeCommand: memia connector probe notion

  - id: slack
    name: Slack
    family: communication
    supportLevel: gateway
    implementationStatus: scaffolded
    adapter:
      type: rest_or_mcp
      auth: oauth_or_bot_token
      baseUrl: https://slack.com/api
      secretRef: keychain://memia/connectors/slack
    reads:
      - channels
      - messages
      - threads
      - files_metadata
    writes:
      - proposed_reply
      - proposed_channel_summary
    mapping:
      channel: memia.capture.communication_space
      message: memia.capture.message
      thread: memia.capture.decision_thread
      file: memia.capture.attachment_reference
    conditionsToVerify:
      - Install a workspace OAuth app and store the token as a secretRef.
      - Ship a channel-list probe, a thread sample and a read-only dry-run.
      - Keep every send behind the L5 approval guard.
    nextProbeCommand: memia connector probe slack

