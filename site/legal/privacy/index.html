<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEMIA — Politique de confidentialité</title>
<meta name="robots" content="index,follow">
<link rel="icon" type="image/png" href="/assets/logos/memia-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#F6F1EA;color:#23282F;font-family:'Manrope',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:#BC5E2E}
  a:hover{color:#A94E22}
  button{font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  "use strict";
  var monogram = "/assets/logos/memia-monogram.png";
  var content = {
    fr: {
      back:'Retour à l’accueil', footerTagline:'MEMIA BPOS — Business & Personal Operating System',
      h1:'Politique de confidentialité',
      updated:'Dernière mise à jour : à compléter avant publication.',
      notice:'Modèle à valider par Selim / conseil juridique avant mise en ligne. Les mentions entre crochets doivent être complétées.',
      blocks:[
        {h:'Responsable de traitement', p:'Kairros [forme juridique, adresse, contact : privacy@memia.ai].'},
        {h:'Données collectées (waitlist)', p:'Uniquement votre adresse email, avec votre consentement, pour vous informer de l’ouverture de MEMIA Cloud. Base légale : consentement (RGPD art. 6.1.a).'},
        {h:'Conservation & vos droits', p:'Email conservé jusqu’au lancement puis [durée]. Vous pouvez retirer votre consentement, accéder, rectifier ou supprimer vos données à tout moment via privacy@memia.ai. Vous pouvez saisir la CNIL.'},
        {h:'Sous-traitants', p:'[Fournisseur d’email / hébergeur — à lister]. Aucune revente de données. Aucun suivi publicitaire.'},
        {h:'Données MEMIA BPOS local', p:'L’installation locale ne transmet aucune donnée à Kairros. Votre mémoire reste sur votre instance. MEMIA Cloud fera l’objet d’un DPA et d’une politique dédiée à l’ouverture.'}
      ]
    },
    en: {
      back:'Back home', footerTagline:'MEMIA BPOS — Business & Personal Operating System',
      h1:'Privacy policy',
      updated:'Last updated: to complete before publishing.',
      notice:'Template to be validated by Selim / legal counsel before going live. Bracketed items must be completed.',
      blocks:[
        {h:'Data controller', p:'Kairros [legal form, address, contact: privacy@memia.ai].'},
        {h:'Data collected (waitlist)', p:'Only your email address, with your consent, to inform you when MEMIA Cloud opens. Legal basis: consent (GDPR art. 6.1.a).'},
        {h:'Retention & your rights', p:'Email kept until launch then [duration]. You may withdraw consent, access, rectify or delete your data anytime via privacy@memia.ai. You may lodge a complaint with your data authority.'},
        {h:'Sub-processors', p:'[Email provider / host — to be listed]. No data resale. No advertising tracking.'},
        {h:'Local MEMIA BPOS data', p:'The local install transmits no data to Kairros. Your memory stays on your instance. MEMIA Cloud will have a dedicated DPA and policy at launch.'}
      ]
    }
  };
  var state = { lang: (function(){ try { return localStorage.getItem('memia_lang'); } catch(e){ return null; } })() || 'fr' };

  function view(){
    var L = state.lang, t = content[L];
    var frBg = L==='fr'?'#F6E5D7':'transparent', frColor = L==='fr'?'#A9713F':'#8A8170';
    var enBg = L==='en'?'#F6E5D7':'transparent', enColor = L==='en'?'#A9713F':'#8A8170';
    var h = '<div style="min-height:100vh;display:flex;flex-direction:column">';
    h += '<header style="position:sticky;top:0;z-index:40;background:rgba(251,247,241,.9);backdrop-filter:blur(10px);border-bottom:1px solid #ECE3D7">'
      + '<div style="max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px">'
      + '<a href="/" style="display:flex;align-items:center;gap:11px;text-decoration:none"><img src="'+monogram+'" alt="MEMIA" style="height:32px;width:32px;display:block" /><span style="font:400 22px/1 \'Jost\',sans-serif;letter-spacing:.14em;color:#23282F">MEMIA</span><span style="font:700 10px/1 \'Manrope\';letter-spacing:.13em;color:#A9713F;background:#F6E5D7;padding:5px 9px;border-radius:6px">BPOS</span></a>'
      + '<div style="display:flex;gap:2px;padding:3px;background:#fff;border:1px solid #ECE3D7;border-radius:10px;margin-left:auto">'
      + '<button data-lang="fr" style="padding:6px 11px;border:none;border-radius:7px;font:700 12px/1 \'Manrope\';background:'+frBg+';color:'+frColor+'">FR</button>'
      + '<button data-lang="en" style="padding:6px 11px;border:none;border-radius:7px;font:700 12px/1 \'Manrope\';background:'+enBg+';color:'+enColor+'">EN</button></div>'
      + '</div></header>';
    h += '<main style="flex:1"><section style="max-width:760px;margin:0 auto;padding:52px 20px">'
      + '<h1 style="margin:0;font:600 34px/1.2 \'Jost\';color:#23282F">'+t.h1+'</h1>'
      + '<p style="margin:10px 0 24px;font:500 13px/1.5 \'Manrope\';color:#8A8170">'+t.updated+'</p>'
      + '<div style="background:#FBF4EC;border:1px solid #F0DCC5;border-radius:14px;padding:16px 20px;font:500 13px/1.6 \'Manrope\';color:#5A6068">'+t.notice+'</div>'
      + t.blocks.map(function(b){ return '<h3 style="margin:26px 0 0;font:600 17px/1.3 \'Jost\';color:#23282F">'+b.h+'</h3><p style="margin:8px 0 0;font:500 14px/1.6 \'Manrope\';color:#5A6068">'+b.p+'</p>'; }).join('')
      + '<p style="margin:28px 0 0"><a href="/" style="font:600 14px/1 \'Manrope\';color:#BC5E2E;text-decoration:none">← '+t.back+'</a></p>'
      + '</section></main>';
    h += '<footer style="border-top:1px solid #ECE3D7;padding:28px 20px"><div style="max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:9px"><img src="'+monogram+'" alt="MEMIA" style="height:20px;width:auto" /><span style="font:600 12.5px/1 \'Manrope\';color:#8A8170">'+t.footerTagline+'</span></div></footer>';
    h += '</div>';
    return h;
  }
  function render(){ document.getElementById('app').innerHTML = view(); document.documentElement.lang = state.lang; }
  document.addEventListener('click', function(e){ var el=e.target.closest&&e.target.closest('[data-lang]'); if(!el) return; state.lang=el.getAttribute('data-lang'); try{localStorage.setItem('memia_lang',state.lang)}catch(e){}; render(); });
  render();
})();
</script>
</body>
</html>
