    h += '<footer style="border-top:1px solid #ECE3D7;padding:28px 20px">'
      + '<div style="max-width:1180px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:space-between">'
      + '<div style="display:flex;align-items:center;gap:9px"><img src="'+monogram+'" alt="MEMIA" style="height:20px;width:auto" /><span style="font:600 12.5px/1 \'Manrope\';color:#8A8170">'+t.footerTagline+'</span></div>'
      + '<span style="font:500 12px/1 \'Manrope\';color:#B6AC9B">© 2026 MEMIA</span></div></footer>';

    h += '</div>';

    // MODALS
    if(d.connectorModal){
      var cm = d.connectorModal;
      h += '<div data-overlay="1" style="position:fixed;inset:0;z-index:100;background:rgba(35,40,47,.55);display:flex;align-items:center;justify-content:center;padding:20px">'
        + '<div data-modalbody="1" style="max-width:640px;width:100%;max-height:86vh;overflow-y:auto;background:#FBF7F1;border-radius:22px;padding:30px;position:relative">'
        + '<button data-close="1" style="position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:99px;background:#fff;border:1px solid #ECE3D7;color:#5A6068;font:600 16px/1 \'Manrope\'">×</button>'
        + '<div style="display:flex;align-items:center;gap:12px"><span style="width:44px;height:44px;border-radius:12px;background:'+cm.iconBg+';color:'+cm.iconColor+';display:flex;align-items:center;justify-content:center">'+cm.iconHtml+'</span><div><div style="font:700 19px/1.2 \'Jost\';color:#23282F">'+cm.name+'</div><div style="margin-top:3px;font:500 13px/1.4 \'Manrope\';color:#5A6068">'+cm.benefit+'</div></div></div>'
        + '<div style="margin-top:22px;display:flex;flex-direction:column;gap:10px">'
        + cm.connectors.map(function(c){ return '<div style="background:#fff;border:1px solid #ECE3D7;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span style="width:34px;height:34px;flex:none;border-radius:9px;background:#F7F2EB;border:1px solid #ECE3D7;display:flex;align-items:center;justify-content:center;padding:6px"><img src="'+c.icon+'" alt="'+c.name+'" style="width:100%;height:100%;object-fit:contain" /></span><div style="flex:1 1 140px"><div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap"><span style="font:700 13.5px/1.3 \'Manrope\';color:#23282F">'+c.name+'</span><span style="font:700 9.5px/1 \'Manrope\';letter-spacing:.04em;text-transform:uppercase;color:'+c.supportColor+';background:'+c.supportBg+';padding:3px 7px;border-radius:99px">'+c.support+'</span></div><div style="margin-top:3px;font:500 12px/1.4 \'Manrope\';color:#5A6068">'+c.benefit+'</div></div><span style="font:700 10px/1 \'Manrope\';letter-spacing:.05em;text-transform:uppercase;color:'+c.statusColor+';background:'+c.statusBg+';padding:5px 8px;border-radius:99px">'+c.status+'</span></div>'; }).join('')
        + '</div>'
        + '<div style="margin-top:16px;font:500 11.5px/1.5 \'Manrope\';color:#8A8170">'+t.supportLegend+'</div>'
        + '</div></div>';
    }
    if(d.agentModal){
      var am = d.agentModal;
      h += '<div data-overlay="1" style="position:fixed;inset:0;z-index:100;background:rgba(35,40,47,.55);display:flex;align-items:center;justify-content:center;padding:20px">'
        + '<div data-modalbody="1" style="max-width:720px;width:100%;max-height:86vh;overflow-y:auto;background:#FBF7F1;border-radius:22px;padding:30px;position:relative">'
        + '<button data-close="1" style="position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:99px;background:#fff;border:1px solid #ECE3D7;color:#5A6068;font:600 16px/1 \'Manrope\'">×</button>'
        + '<div style="display:flex;align-items:center;gap:12px"><span style="width:44px;height:44px;border-radius:12px;background:'+am.iconBg+';color:'+am.iconColor+';display:flex;align-items:center;justify-content:center">'+am.iconHtml+'</span><div><div style="font:700 19px/1.2 \'Jost\';color:#23282F">'+am.name+' — '+am.count+' '+t.numSpecialized+'</div><div style="margin-top:3px;font:500 13px/1.4 \'Manrope\';color:#5A6068">'+am.benefit+'</div></div></div>'
        + '<div style="margin-top:16px;font:500 13.5px/1.6 \'Manrope\';color:#3A3F47">'+am.helpText+'</div>'
        + '<div style="margin-top:20px;font:700 11.5px/1 \'Manrope\';letter-spacing:.08em;text-transform:uppercase;color:#8A8170">'+t.agentsIncluded+'</div>'
        + '<div style="margin-top:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">'
        + am.agents.map(function(ag){ return '<div style="background:#fff;border:1px solid #ECE3D7;border-radius:14px;padding:14px 16px"><div style="font:700 13.5px/1.3 \'Manrope\';color:#23282F">'+ag.publicName+'</div><div style="font:500 10.5px/1.3 \'JetBrains Mono\',monospace;color:#B6AC9B">'+ag.techName+'</div><div style="margin-top:8px;font:500 12.5px/1.5 \'Manrope\';color:#5A6068">'+ag.mission+'</div><div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px">'+(ag.tags||[]).map(function(tg){ return '<span style="font:600 10px/1 \'Manrope\';color:#8A8170;background:#F7F2EB;border:1px solid #ECE3D7;padding:4px 7px;border-radius:99px">'+tg+'</span>'; }).join('')+'</div></div>'; }).join('')
        + '</div>'
        + (am.hasMore?'<div style="margin-top:12px;font:600 12.5px/1.5 \'Manrope\';color:#8A8170">'+am.moreLabel+'</div>':'')
        + '<div style="margin-top:20px;text-align:center"><a href="/cloud/" style="display:inline-block;font:700 14px/1 \'Manrope\';color:#fff;background:#BC5E2E;padding:14px 22px;border-radius:12px;text-decoration:none">'+t.useFamilyCta+'</a></div>'
        + '</div></div>';
    }

    return h;
  }

  function setLang(l){ state.lang = l; try { localStorage.setItem('memia_lang', l); } catch(e){}; document.documentElement.lang = l; render(); }
  function render(){
    var app = document.getElementById('app');
    app.innerHTML = view();
    document.documentElement.lang = state.lang;
  }
  document.addEventListener('click', function(e){
    var el = e.target.closest ? e.target.closest('[data-lang],[data-conn],[data-agent],[data-close],[data-overlay]') : null;
    if(!el) return;
    if(el.hasAttribute('data-lang')){ setLang(el.getAttribute('data-lang')); return; }
    if(el.hasAttribute('data-conn')){ state.activeModal = {kind:'connector', key:el.getAttribute('data-conn')}; render(); return; }
    if(el.hasAttribute('data-agent')){ state.activeModal = {kind:'agent', key:el.getAttribute('data-agent')}; render(); return; }
    if(el.hasAttribute('data-close')){ state.activeModal = null; render(); return; }
    if(el.hasAttribute('data-overlay')){ if(e.target === el){ state.activeModal = null; render(); } return; }
  });
  render();
})();
</script>
</body>
</html>
