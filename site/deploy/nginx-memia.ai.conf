server {
  listen 80;
  server_name memia.ai www.memia.ai;
  return 301 https://memia.ai$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.memia.ai;
  return 301 https://memia.ai$request_uri;
}

server {
  listen 443 ssl http2;
  server_name memia.ai;

  root /var/www/memia.ai/current;
  index index.html;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header X-Frame-Options DENY always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location / {
    try_files $uri $uri/ /404.html;
  }

  location ~* \.(css|js|png|jpg|jpeg|webp|ico|svg|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location /deploy/ {
    deny all;
  }

  location ~ /\.(?!well-known) {
    deny all;
  }

  location ~* (env|package\.json|README|SECURITY|_memia|node_modules|agents/catalog|runtime|cache|logs) {
    deny all;
  }
}
