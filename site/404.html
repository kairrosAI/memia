<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEMIA BPOS — 404</title>
<link rel="icon" type="image/png" href="/assets/logos/memia-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:#F6F1EA;color:#23282F;font-family:'Manrope',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;padding:24px}
  a{text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <img src="/assets/logos/memia-monogram.png" alt="MEMIA" style="height:56px;width:56px">
  <div style="font:600 64px/1 'Jost';color:#23282F;margin-top:10px">404</div>
  <p style="font:500 16px/1.5 'Manrope';color:#5A6068;max-width:420px">
    <span data-fr>Cette page n’existe pas ou a été déplacée.</span><span data-en hidden>This page doesn’t exist or has moved.</span>
  </p>
  <a href="/" style="margin-top:12px;font:700 14px/1 'Manrope';color:#fff;background:#BC5E2E;padding:13px 20px;border-radius:11px">
    <span data-fr>Retour à l’accueil</span><span data-en hidden>Back home</span>
  </a>
</div>
<script>
  try{ if((localStorage.getItem('memia_lang')||'fr')==='en'){ document.documentElement.lang='en'; document.querySelectorAll('[data-fr]').forEach(function(e){e.hidden=true}); document.querySelectorAll('[data-en]').forEach(function(e){e.hidden=false}); } }catch(e){}
</script>
</body>
</html>
