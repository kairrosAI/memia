<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEMIA Cloud — Bientôt disponible</title>
<meta name="description" content="MEMIA Cloud arrive bientôt : votre espace MEMIA hébergé, synchronisé et prêt à connecter vos surfaces de travail. Laissez votre email pour être prévenu au lancement.">
<link rel="icon" type="image/png" href="/assets/logos/memia-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#F6F1EA;color:#23282F;font-family:'Manrope',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:#BC5E2E}
  a:hover{color:#A94E22}
  input{font-family:inherit}
  button{font-family:inherit;cursor:pointer}
  @keyframes pulseSoft{0%,100%{opacity:1}50%{opacity:.5}}
  @keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  @keyframes spinBack{0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)}}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important;transition:none !important} }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  "use strict";
  var monogram = "/assets/logos/memia-monogram.png";
  var CONN = "/assets/connectors/";
  var logos = {
    gmail: CONN+'gmail.svg', whatsapp: CONN+'whatsapp.svg', slack: CONN+'slack.svg', teams: CONN+'teams.svg',
    outlook: CONN+'outlook.svg', calendar: CONN+'googlecalendar.svg', drive: CONN+'googledrive.svg',
    onedrive: CONN+'onedrive.svg', notion: CONN+'notion.svg', github: CONN+'github.svg', jira: CONN+'jira.svg',
    hubspot: CONN+'hubspot.svg', salesforce: CONN+'salesforce.svg', zoom: CONN+'zoom.svg'
  };
  var innerPos = [ {top:'2%', left:'50%'}, {top:'50%', left:'92%'}, {top:'92%', left:'50%'}, {top:'50%', left:'2%'} ];
  var outerPos = [ {top:'6%', left:'22%'}, {top:'6%', left:'72%'}, {top:'50%', left:'-2%'}, {top:'50%', left:'96%'}, {top:'88%', left:'22%'}, {top:'88%', left:'72%'} ];
  var innerKeys = ['gmail','whatsapp','slack','teams'];
  var outerKeys = ['outlook','calendar','drive','notion','github','hubspot'];
  var allKeys = ['gmail','whatsapp','slack','teams','outlook','calendar','drive','onedrive','notion','github','jira','hubspot','salesforce','zoom'];

  var content = {
    fr: {
      navProduit:'Produit', navConnecteurs:'Connecteurs', navAgents:'Agents', navSecurite:'Sécurité', navInstaller:'Installer localement',
      badge: 'MEMIA Cloud',
      title: 'MEMIA Cloud arrive bientôt.',
      subtitle: 'Créez bientôt votre espace MEMIA hébergé, synchronisé et prêt à connecter vos surfaces de travail.',
      comingSoon: 'Bientôt disponible',
      connectedLabel: 'Connectera notamment',
      badgeHosted: 'Hébergé', badgeSynced: 'Synchronisé', badgeGoverned: 'Gouverné',
      body: "Nous préparons MEMIA Cloud pour permettre aux équipes, dirigeants et builders de démarrer plus simplement avec MEMIA BPOS, sans installation locale. Laissez votre email et nous vous préviendrons dès l'ouverture.",
      emailPlaceholder: 'Votre email',
      notifyBtn: 'Me prévenir au lancement',
      microcopy: 'Pas de spam. Uniquement les nouvelles importantes sur MEMIA Cloud.',
      privacyLink: 'Confidentialité',
      sending: 'Envoi…',
      errorMsg: 'Veuillez entrer un email valide.',
      netErrorMsg: 'Un souci est survenu. Réessayez dans un instant.',
      successMsg: 'Merci, vous êtes inscrit. Nous vous préviendrons dès que MEMIA Cloud sera disponible.',
      altTitle: 'Vous voulez commencer maintenant ?',
      altBody: 'MEMIA BPOS peut déjà s’installer localement pour les utilisateurs techniques.',
      installBtn: 'Installer localement',
      guideBtn: "Lire le guide d'installation",
      footerTagline: 'MEMIA BPOS — Business & Personal Operating System'
    },
    en: {
      navProduit:'Product', navConnecteurs:'Connectors', navAgents:'Agents', navSecurite:'Security', navInstaller:'Install locally',
      badge: 'MEMIA Cloud',
      title: 'MEMIA Cloud is coming soon.',
      subtitle: 'Create your hosted MEMIA workspace soon, ready to sync and connect your work surfaces.',
      comingSoon: 'Coming soon',
      connectedLabel: 'Will connect to, among others',
      badgeHosted: 'Hosted', badgeSynced: 'Synced', badgeGoverned: 'Governed',
      body: 'We are preparing MEMIA Cloud so teams, operators and builders can start with MEMIA BPOS without a local setup. Leave your email and we will notify you when access opens.',
      emailPlaceholder: 'Your email',
      notifyBtn: 'Notify me at launch',
      microcopy: 'No spam. Only important MEMIA Cloud updates.',
      privacyLink: 'Privacy',
      sending: 'Sending…',
      errorMsg: 'Please enter a valid email.',
      netErrorMsg: 'Something went wrong. Please try again in a moment.',
      successMsg: "Thank you, you're on the list. We'll notify you when MEMIA Cloud is available.",
      altTitle: 'Want to start now?',
      altBody: 'MEMIA BPOS can already be installed locally by technical users.',
      installBtn: 'Install locally',
      guideBtn: 'Read the installation guide',
      footerTagline: 'MEMIA BPOS — Business & Personal Operating System'
    }
  };

  var state = { lang: (function(){ try { return localStorage.getItem('memia_lang'); } catch(e){ return null; } })() || 'fr', email: '', website: '', submitted: false, error: false, netError: false, sending: false };
  function isValidEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  function view(){
    var L = state.lang, t = content[L];
    var frBg = L==='fr'?'#F6E5D7':'transparent', frColor = L==='fr'?'#A9713F':'#8A8170';
    var enBg = L==='en'?'#F6E5D7':'transparent', enColor = L==='en'?'#A9713F':'#8A8170';
    var innerLogos = innerKeys.map(function(k,i){ return {icon:logos[k], name:k, top:innerPos[i].top, left:innerPos[i].left}; });
    var outerLogos = outerKeys.map(function(k,i){ return {icon:logos[k], name:k, top:outerPos[i].top, left:outerPos[i].left}; });
    var allLogos = allKeys.map(function(k){ return {icon:logos[k], name:k}; });
    var h = '';
    h += '<div style="min-height:100vh;display:flex;flex-direction:column">';

    // HEADER
    h += '<header style="position:sticky;top:0;z-index:40;background:rgba(251,247,241,.9);backdrop-filter:blur(10px);border-bottom:1px solid #ECE3D7">'
      + '<div style="max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:14px 22px">'
      + '<a href="/" style="display:flex;align-items:center;gap:11px;text-decoration:none">'
      + '<img src="'+monogram+'" alt="MEMIA" style="height:32px;width:32px;display:block" />'
      + '<span style="font:400 22px/1 \'Jost\',sans-serif;letter-spacing:.14em;color:#23282F">MEMIA</span>'
      + '<span style="font:700 10px/1 \'Manrope\';letter-spacing:.13em;color:#A9713F;background:#F6E5D7;padding:5px 9px;border-radius:6px">BPOS</span></a>'
      + '<nav style="display:flex;flex-wrap:wrap;gap:20px;margin-left:8px">'
      + '<a href="/#produit" style="font:600 14px/1 \'Manrope\';color:#3A3F47;text-decoration:none">'+t.navProduit+'</a>'
      + '<a href="/#connecteurs" style="font:600 14px/1 \'Manrope\';color:#3A3F47;text-decoration:none">'+t.navConnecteurs+'</a>'
      + '<a href="/#agents" style="font:600 14px/1 \'Manrope\';color:#3A3F47;text-decoration:none">'+t.navAgents+'</a>'
      + '<a href="/cloud/" style="font:600 14px/1 \'Manrope\';color:#BC5E2E;text-decoration:none">MEMIA Cloud</a>'
      + '<a href="/#securite" style="font:600 14px/1 \'Manrope\';color:#3A3F47;text-decoration:none">'+t.navSecurite+'</a>'
      + '<a href="/#installer" style="font:600 14px/1 \'Manrope\';color:#3A3F47;text-decoration:none">'+t.navInstaller+'</a>'
      + '</nav>'
      + '<div style="display:flex;align-items:center;gap:10px;margin-left:auto">'
      + '<div style="display:flex;gap:2px;padding:3px;background:#fff;border:1px solid #ECE3D7;border-radius:10px">'
      + '<button data-lang="fr" style="padding:6px 11px;border:none;border-radius:7px;font:700 12px/1 \'Manrope\';background:'+frBg+';color:'+frColor+'">FR</button>'
      + '<button data-lang="en" style="padding:6px 11px;border:none;border-radius:7px;font:700 12px/1 \'Manrope\';background:'+enBg+';color:'+enColor+'">EN</button>'
      + '</div>'
      + '<a href="/#installer" style="font:700 13.5px/1 \'Manrope\';color:#fff;background:#BC5E2E;padding:11px 18px;border-radius:11px;text-decoration:none;white-space:nowrap">'+t.navInstaller+'</a>'
      + '</div></div></header>';

    // MAIN
    h += '<main style="flex:1;padding:56px 20px"><div style="max-width:640px;margin:0 auto;text-align:center">'
      + '<div style="display:flex;align-items:center;justify-content:center;gap:14px"><img src="'+monogram+'" alt="MEMIA" style="height:48px;width:48px;display:block" /><span style="font:400 34px/1 \'Jost\',sans-serif;letter-spacing:.2em;color:#23282F">MEMIA</span></div>'
      + '<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:#FBF4EC;border:1px solid #F0DCC5;border-radius:99px;margin-top:22px"><span style="width:7px;height:7px;border-radius:99px;background:#C9821F;animation:pulseSoft 3.4s ease-in-out infinite"></span><span style="font:700 11.5px/1 \'Manrope\';letter-spacing:.05em;color:#A9713F">'+t.badge+'</span></div>'
      + '<h1 style="margin:22px 0 0;font:600 38px/1.2 \'Jost\';color:#23282F">'+t.title+'</h1>'
      + '<p style="margin:16px auto 0;max-width:500px;font:500 16px/1.6 \'Manrope\';color:#3A3F47">'+t.subtitle+'</p>';

    // CLOUD VISUAL
    h += '<div style="margin:40px auto 0;width:480px;max-width:100%;position:relative;height:480px">'
      + '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div style="width:340px;height:340px;border-radius:50%;border:1px dashed #E2D9CC"></div></div>'
      + '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div style="width:210px;height:210px;border-radius:50%;border:1px dashed #E9E1D3"></div></div>'
      + '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:88px;height:88px;border-radius:24px;background:#fff;border:1.5px solid #ECE3D7;box-shadow:0 16px 34px -16px rgba(60,40,20,.28);display:flex;align-items:center;justify-content:center;z-index:2"><img src="'+monogram+'" alt="MEMIA" style="width:48px;height:48px" /></div>'
      + '<div style="position:absolute;inset:0;animation:spin 34s linear infinite">'
      + innerLogos.map(function(lg){ return '<div style="position:absolute;top:'+lg.top+';left:'+lg.left+';transform:translate(-50%,-50%)"><span style="width:58px;height:58px;border-radius:14px;background:#fff;border:1px solid #ECE3D7;box-shadow:0 8px 18px -10px rgba(60,40,20,.16);display:flex;align-items:center;justify-content:center;padding:11px;animation:spinBack 34s linear infinite"><img src="'+lg.icon+'" alt="'+lg.name+'" style="width:100%;height:100%;object-fit:contain" /></span></div>'; }).join('')
      + '</div>'
      + '<div style="position:absolute;inset:0;animation:spinBack 48s linear infinite">'
      + outerLogos.map(function(lg){ return '<div style="position:absolute;top:'+lg.top+';left:'+lg.left+';transform:translate(-50%,-50%)"><span style="width:64px;height:64px;border-radius:15px;background:#fff;border:1px solid #ECE3D7;box-shadow:0 8px 18px -10px rgba(60,40,20,.16);display:flex;align-items:center;justify-content:center;padding:12px;animation:spin 48s linear infinite"><img src="'+lg.icon+'" alt="'+lg.name+'" style="width:100%;height:100%;object-fit:contain" /></span></div>'; }).join('')
      + '</div>'
      + '<div style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font:700 10px/1 \'Manrope\';letter-spacing:.06em;text-transform:uppercase;color:#A9713F;background:#F6E5D7;border:1px solid #E9C9A6;padding:5px 9px;border-radius:99px;white-space:nowrap;z-index:2">'+t.comingSoon+'</div>'
      + '</div>';

    // badges
    h += '<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:24px">'
      + '<span style="font:700 11px/1 \'Manrope\';color:#5A6068;background:#fff;border:1px solid #ECE3D7;padding:8px 13px;border-radius:99px">'+t.badgeHosted+'</span>'
      + '<span style="font:700 11px/1 \'Manrope\';color:#5A6068;background:#fff;border:1px solid #ECE3D7;padding:8px 13px;border-radius:99px">'+t.badgeSynced+'</span>'
      + '<span style="font:700 11px/1 \'Manrope\';color:#5A6068;background:#fff;border:1px solid #ECE3D7;padding:8px 13px;border-radius:99px">'+t.badgeGoverned+'</span></div>'
      + '<p style="margin:26px auto 0;max-width:480px;font:500 14.5px/1.6 \'Manrope\';color:#5A6068">'+t.body+'</p>';

    // FORM CARD
    h += '<div style="margin:26px auto 0;max-width:460px;background:#fff;border:1px solid #ECE3D7;border-radius:20px;padding:22px;box-shadow:0 18px 44px -24px rgba(60,40,20,.2)">';
    if(!state.submitted){
      h += '<div style="display:flex;flex-wrap:wrap;gap:10px">'
        + '<input id="memia-email" type="email" autocomplete="email" value="'+(state.email||'').replace(/"/g,'&quot;')+'" placeholder="'+t.emailPlaceholder+'" style="flex:1 1 220px;min-width:180px;padding:14px 16px;border-radius:11px;border:1px solid #ECE3D7;background:#FBF7F1;font:600 14px/1 \'Manrope\';color:#23282F" />'
        + '<button data-submit="1"'+(state.sending?' disabled':'')+' style="flex:none;font:700 14px/1 \'Manrope\';color:#fff;background:#BC5E2E;padding:14px 20px;border:none;border-radius:11px;opacity:'+(state.sending?'.6':'1')+'">'+(state.sending?t.sending:t.notifyBtn)+'</button></div>'
        + '<input id="memia-website" type="text" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0" />'
        + (state.error?'<div style="margin-top:10px;text-align:left;font:600 12.5px/1.4 \'Manrope\';color:#CF4B36">'+(state.netError?t.netErrorMsg:t.errorMsg)+'</div>':'')
        + '<div style="margin-top:12px;font:500 12px/1.5 \'Manrope\';color:#8A8170">'+t.microcopy+' <a href="/legal/privacy/" style="color:#A9713F">'+t.privacyLink+'</a></div>';
    } else {
      h += '<div style="display:flex;align-items:center;gap:12px;justify-content:center;padding:6px 0"><span style="width:36px;height:36px;flex:none;border-radius:99px;background:#E4F3EB;color:#1E9E6B;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg></span><div style="text-align:left;font:600 14.5px/1.4 \'Manrope\';color:#23282F">'+t.successMsg+'</div></div>';
    }
    h += '</div>';

    // ALTERNATIVE
    h += '<div style="margin:44px auto 0;max-width:520px;background:#FBF7F1;border:1px solid #ECE3D7;border-radius:18px;padding:24px">'
      + '<div style="font:700 15px/1.3 \'Manrope\';color:#23282F">'+t.altTitle+'</div>'
      + '<div style="margin-top:6px;font:500 13.5px/1.5 \'Manrope\';color:#5A6068">'+t.altBody+'</div>'
      + '<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:16px">'
      + '<a href="/#installer" style="font:700 13.5px/1 \'Manrope\';color:#23282F;background:#fff;border:1px solid #ECE3D7;padding:12px 18px;border-radius:11px;text-decoration:none">'+t.installBtn+'</a>'
      + '<a href="/#installer" style="font:700 13.5px/1 \'Manrope\';color:#BC5E2E;padding:12px 18px;border-radius:11px;text-decoration:none">'+t.guideBtn+'</a></div></div>';

    // CONNECTED SURFACES STRIP
    h += '<div style="margin:48px auto 0;max-width:640px"><div style="font:700 11px/1 \'Manrope\';letter-spacing:.12em;text-transform:uppercase;color:#8A8170">'+t.connectedLabel+'</div>'
      + '<div style="margin-top:16px;display:flex;flex-wrap:wrap;justify-content:center;gap:12px">'
      + allLogos.map(function(lg){ return '<span style="width:56px;height:56px;border-radius:13px;background:#fff;border:1px solid #ECE3D7;display:flex;align-items:center;justify-content:center;padding:10px"><img src="'+lg.icon+'" alt="'+lg.name+'" style="width:100%;height:100%;object-fit:contain" /></span>'; }).join('')
      + '</div></div>';

    h += '</div></main>';

    // FOOTER
    h += '<footer style="border-top:1px solid #ECE3D7;padding:28px 20px"><div style="max-width:1180px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:space-between"><div style="display:flex;align-items:center;gap:9px"><img src="'+monogram+'" alt="MEMIA" style="height:20px;width:auto" /><span style="font:600 12.5px/1 \'Manrope\';color:#8A8170">'+t.footerTagline+'</span></div><span style="font:500 12px/1 \'Manrope\';color:#B6AC9B">© 2026 MEMIA</span></div></footer>';

    h += '</div>';
    return h;
  }

  function render(){ document.getElementById('app').innerHTML = view(); document.documentElement.lang = state.lang; }
  function setLang(l){ state.lang = l; try { localStorage.setItem('memia_lang', l); } catch(e){}; render(); }

  document.addEventListener('input', function(e){
    if(e.target && e.target.id === 'memia-email'){ state.email = e.target.value; if(state.error){ state.error = false; state.netError = false; } }
    if(e.target && e.target.id === 'memia-website'){ state.website = e.target.value; }
  });
  function submitWaitlist(){
    var input = document.getElementById('memia-email');
    var hp = document.getElementById('memia-website');
    if(input) state.email = input.value;
    if(hp) state.website = hp.value;
    if(!isValidEmail(state.email)){ state.error = true; state.netError = false; render(); return; }
    state.sending = true; state.error = false; state.netError = false; render();
    fetch('/api/waitlist', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ email: state.email, lang: state.lang, website: state.website })
    }).then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function(){ state.sending = false; state.submitted = true; state.error = false; state.netError = false; render(); })
      .catch(function(){ state.sending = false; state.error = true; state.netError = true; render(); });
  }
  document.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && e.target && e.target.id === 'memia-email'){ e.preventDefault(); if(!state.sending) submitWaitlist(); }
  });
  document.addEventListener('click', function(e){
    var el = e.target.closest ? e.target.closest('[data-lang],[data-submit]') : null;
    if(!el) return;
    if(el.hasAttribute('data-lang')){ setLang(el.getAttribute('data-lang')); return; }
    if(el.hasAttribute('data-submit')){ if(!state.sending) submitWaitlist(); return; }
  });
  render();
})();
</script>
</body>
</html>
